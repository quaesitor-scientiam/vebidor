<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1280">
<title>Vebidor — Playwright-style browser automation for V</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  html, body { background: var(--surface-0); }
  body { margin: 0; }
  *, *::before, *::after { box-sizing: border-box; }
  button { font: inherit; }
  .mk-container { max-width: var(--container-wide); margin: 0 auto; padding: 0 32px; }
  .mk-section { padding: 80px 0; }
  .mk-section--tight { padding: 56px 0; }
  .mk-section--alt { background: var(--surface-1); border-top: 1px solid var(--border-1); border-bottom: 1px solid var(--border-1); }
</style>
</head>
<body>
  <div id="root"></div>

  <!-- Vendored React (no CDN, no in-browser Babel). The .jsx files under
       components/ + app.jsx are the editable source; app.bundle.js is the
       compiled output. Rebuild with: pwsh -NoProfile -File build.ps1 -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="app.bundle.js"></script>
</body>
</html>
