<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 28px 26px; background: var(--surface-50, #F8FAFC); }
  .label { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); margin: 0 0 18px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 100%; height: 80px; background: #fff; border-radius: var(--radius-lg); border: 1px solid var(--border-1); display: flex; align-items: center; justify-content: center; font-family: var(--font-sans); font-weight: 500; color: var(--fg-2); font-size: 13px; }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--fg-1); font-weight: 500; }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); text-align: center; line-height: 1.4; }
</style>
</head>
<body>
  <div class="label">Elevation · two steps · used sparingly</div>
  <div class="grid">
    <div class="item">
      <div class="box">at rest</div>
      <div class="name">--shadow-none</div>
      <div class="meta">none</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow:0 1px 3px rgba(11,18,32,0.06), 0 1px 2px rgba(11,18,32,0.04)">card / hover</div>
      <div class="name">--shadow-card</div>
      <div class="meta">0 1 3 / .06 + 0 1 2 / .04</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow:0 8px 24px rgba(11,18,32,0.10), 0 2px 6px rgba(11,18,32,0.06)">popover / menu</div>
      <div class="name">--shadow-pop</div>
      <div class="meta">0 8 24 / .10 + 0 2 6 / .06</div>
    </div>
  </div>
</body>
</html>
