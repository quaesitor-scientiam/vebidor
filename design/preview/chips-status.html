<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Status Chips</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-0); }
  .label { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); margin: 0 0 14px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
  .group { margin-bottom: 14px; }
  .group:last-child { margin-bottom: 0; }
  .group-h { font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-3); margin-bottom: 8px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; }
</style>
</head>
<body>
  <div class="label">Status chips · pill · 1 emoji + label</div>
  <div class="group">
    <div class="group-h">// in changelog &amp; comparison tables</div>
    <div class="row">
      <span class="chip chip--success"><span class="emoji">✅</span> Complete</span>
      <span class="chip chip--info"><span class="emoji">✨</span> New in v4.2</span>
      <span class="chip chip--warning"><span class="emoji">⚠️</span> Protocol limit</span>
      <span class="chip chip--danger"><span class="emoji">🐛</span> Fixed</span>
      <span class="chip chip--milestone"><span class="emoji">🏆</span> 100% parity</span>
      <span class="chip chip--neutral">Phase 8</span>
    </div>
  </div>
  <div class="group">
    <div class="group-h">// browser support inline chips</div>
    <div class="row">
      <span class="chip" style="background:rgba(15,108,189,.10);color:var(--browser-edge);border:1px solid rgba(15,108,189,.25)">Edge</span>
      <span class="chip" style="background:rgba(26,115,232,.10);color:var(--browser-chrome);border:1px solid rgba(26,115,232,.25)">Chrome</span>
      <span class="chip" style="background:rgba(255,113,57,.10);color:var(--browser-firefox);border:1px solid rgba(255,113,57,.25)">Firefox</span>
      <span class="chip" style="background:rgba(15,181,238,.10);color:var(--browser-safari);border:1px solid rgba(15,181,238,.25)">Safari</span>
    </div>
  </div>
</body>
</html>
