<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Semantic Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-0); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .item { border: 1px solid var(--border-1); border-radius: var(--radius-lg); overflow: hidden; }
  .swatch { height: 64px; padding: 10px 12px; display: flex; align-items: flex-start; gap: 8px; font-family: var(--font-sans); font-weight: 600; font-size: 13px; }
  .swatch .em { font-family: var(--font-emoji); font-size: 16px; line-height: 1; }
  .meta { padding: 8px 12px 10px; background: #fff; font-family: var(--font-mono); font-size: 10.5px; color: var(--fg-2); display: flex; justify-content: space-between; }
  .meta strong { color: var(--fg-1); font-weight: 600; }
  .label { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); margin: 0 0 10px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
</style>
</head>
<body>
  <div class="label">Semantic · mapped to emoji vocabulary</div>
  <div class="grid">
    <div class="item">
      <div class="swatch" style="background:var(--success-bg);color:var(--success-fg)"><span class="em">✅</span>Success</div>
      <div class="meta"><strong>fg</strong> #1E9F5E</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:var(--warning-bg);color:var(--warning-fg)"><span class="em">⚠️</span>Warning</div>
      <div class="meta"><strong>fg</strong> #D97706</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:var(--danger-bg);color:var(--danger-fg)"><span class="em">🐛</span>Danger</div>
      <div class="meta"><strong>fg</strong> #DC2626</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:var(--info-bg);color:var(--info-fg)"><span class="em">✨</span>Info</div>
      <div class="meta"><strong>fg</strong> #25409B</div>
    </div>
    <div class="item">
      <div class="swatch" style="background:var(--milestone-bg);color:var(--milestone-fg)"><span class="em">🏆</span>Milestone</div>
      <div class="meta"><strong>fg</strong> #8B6914</div>
    </div>
  </div>
</body>
</html>
