<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Browser Support Matrix</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-0); }
  .label { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); margin: 0 0 12px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .card { border: 1px solid var(--border-1); border-radius: var(--radius-lg); padding: 14px; background: #fff; }
  .head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .head svg { width: 24px; height: 24px; }
  .head .name { font-family: var(--font-sans); font-weight: 600; font-size: 15px; color: var(--fg-1); }
  .meta { display: flex; flex-direction: column; gap: 4px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
  .meta b { color: var(--fg-1); font-weight: 500; }
  .pill { display: inline-flex; align-items: center; gap: 4px; font-family: var(--font-sans); font-size: 10.5px; padding: 2px 7px; border-radius: var(--radius-pill); font-weight: 600; }
  .pill .em { font-family: var(--font-emoji); font-size: 10px; }
  .pill--ok { background: var(--success-bg); color: var(--success-fg); }
</style>
</head>
<body>
  <div class="label">Browser support matrix · all 4 fully implemented</div>
  <div class="grid">
    <div class="card">
      <div class="head" style="color:var(--browser-edge)"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.86 17.86q.14 0 .25.12.1.13.1.25 0 .24-.4.79-.4.54-1.22 1.15-.83.6-2.16 1.06-1.34.45-3.12.45-1.7 0-3.27-.6-1.55-.59-2.72-1.65-1.17-1.07-1.86-2.55-.68-1.48-.68-3.27 0-1.43.43-2.65.43-1.22 1.13-2.18.7-.96 1.61-1.66.92-.7 1.91-1.13.99-.43 2-.65 1.01-.22 1.93-.22Z"/></svg><div class="name">Edge</div></div>
      <div class="meta"><span>port <b>9515</b></span><span>EdgeDriver</span><span class="pill pill--ok"><span class="em">✅</span> Production</span></div>
    </div>
    <div class="card">
      <div class="head" style="color:var(--browser-chrome)"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg><div class="name">Chrome</div></div>
      <div class="meta"><span>port <b>9515</b></span><span>ChromeDriver</span><span class="pill pill--ok"><span class="em">✅</span> Production</span></div>
    </div>
    <div class="card">
      <div class="head" style="color:var(--browser-firefox)"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg><div class="name">Firefox</div></div>
      <div class="meta"><span>port <b>4444</b></span><span>GeckoDriver</span><span class="pill pill--ok"><span class="em">✅</span> Production</span></div>
    </div>
    <div class="card">
      <div class="head" style="color:var(--browser-safari)"><svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="10"/></svg><div class="name">Safari</div></div>
      <div class="meta"><span>port <b>4445</b></span><span>SafariDriver</span><span class="pill pill--ok"><span class="em">✅</span> macOS only</span></div>
    </div>
  </div>
</body>
</html>
