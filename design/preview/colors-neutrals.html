<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Slate Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-0); }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border-1); }
  .sw { flex: 1; height: 120px; display: flex; flex-direction: column; justify-content: space-between; padding: 10px 10px; font-family: var(--font-mono); font-size: 10.5px; }
  .sw .step { font-weight: 600; font-size: 12px; }
  .sw .hex { opacity: 0.85; }
  .label { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); margin: 0 0 10px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
</style>
</head>
<body>
  <div class="label">Surface · Slate Neutrals · 12 steps · light → terminal</div>
  <div class="row">
    <div class="sw" style="background:var(--slate-0);color:var(--slate-900);border-right:1px solid var(--border-1)"><span class="step">0</span><span class="hex">#FFFFFF</span></div>
    <div class="sw" style="background:var(--slate-50);color:var(--slate-900)"><span class="step">50</span><span class="hex">#F8FAFC</span></div>
    <div class="sw" style="background:var(--slate-100);color:var(--slate-900)"><span class="step">100</span><span class="hex">#F1F5F9</span></div>
    <div class="sw" style="background:var(--slate-200);color:var(--slate-900)"><span class="step">200</span><span class="hex">#E2E8F0</span></div>
    <div class="sw" style="background:var(--slate-300);color:var(--slate-900)"><span class="step">300</span><span class="hex">#CBD5E1</span></div>
    <div class="sw" style="background:var(--slate-400);color:var(--slate-50)"><span class="step">400</span><span class="hex">#94A3B8</span></div>
    <div class="sw" style="background:var(--slate-500);color:var(--slate-50)"><span class="step">500</span><span class="hex">#64748B</span></div>
    <div class="sw" style="background:var(--slate-600);color:var(--slate-50)"><span class="step">600</span><span class="hex">#475569</span></div>
    <div class="sw" style="background:var(--slate-700);color:var(--slate-50)"><span class="step">700</span><span class="hex">#334155</span></div>
    <div class="sw" style="background:var(--slate-800);color:var(--slate-50)"><span class="step">800</span><span class="hex">#1E293B</span></div>
    <div class="sw" style="background:var(--slate-900);color:var(--slate-50)"><span class="step">900</span><span class="hex">#0F172A</span></div>
    <div class="sw" style="background:var(--slate-950);color:var(--slate-50)"><span class="step">950</span><span class="hex">#0B1220</span></div>
  </div>
</body>
</html>
