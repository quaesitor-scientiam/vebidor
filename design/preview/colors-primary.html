<!-- @dsCard group="Colors" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Primary — Vebidor Blue</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px 24px; background: var(--surface-0); }
  .row { display: flex; gap: 0; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border-1); }
  .sw { flex: 1; height: 120px; display: flex; flex-direction: column; justify-content: space-between; padding: 10px 12px; font-family: var(--font-mono); font-size: 11px; }
  .sw .step { font-weight: 600; font-size: 12px; letter-spacing: 0.02em; }
  .sw .hex { opacity: 0.85; letter-spacing: -0.01em; }
  .label { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); margin: 0 0 10px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
  .core { outline: 2px solid var(--fg-1); outline-offset: -2px; }
  .core::after { content: 'CORE'; position: absolute; margin-top: 64px; margin-left: -8px; font-size: 9px; font-weight: 700; color: var(--fg-1); background: #fff; padding: 1px 4px; border-radius: 3px; }
</style>
</head>
<body>
  <div class="label">Primary · Vebidor Blue · 9 steps</div>
  <div class="row">
    <div class="sw" style="background:var(--vb-blue-50);color:var(--vb-blue-900)"><span class="step">50</span><span class="hex">#EEF3FF</span></div>
    <div class="sw" style="background:var(--vb-blue-100);color:var(--vb-blue-900)"><span class="step">100</span><span class="hex">#DDE7FF</span></div>
    <div class="sw" style="background:var(--vb-blue-200);color:var(--vb-blue-900)"><span class="step">200</span><span class="hex">#B8CBFF</span></div>
    <div class="sw" style="background:var(--vb-blue-300);color:var(--vb-blue-900)"><span class="step">300</span><span class="hex">#8AA8FA</span></div>
    <div class="sw" style="background:var(--vb-blue-400);color:#fff"><span class="step">400</span><span class="hex">#5C82F0</span></div>
    <div class="sw core" style="background:var(--vb-blue-500);color:#fff;position:relative"><span class="step">500</span><span class="hex">#3E63DD</span></div>
    <div class="sw" style="background:var(--vb-blue-600);color:#fff"><span class="step">600</span><span class="hex">#2E4FBE</span></div>
    <div class="sw" style="background:var(--vb-blue-700);color:#fff"><span class="step">700</span><span class="hex">#25409B</span></div>
    <div class="sw" style="background:var(--vb-blue-800);color:#fff"><span class="step">800</span><span class="hex">#1E3A8A</span></div>
    <div class="sw" style="background:var(--vb-blue-900);color:#fff"><span class="step">900</span><span class="hex">#15265F</span></div>
  </div>
</body>
</html>
