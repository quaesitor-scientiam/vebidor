<!-- @dsCard group="Spacing" -->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 22px 26px; background: var(--surface-0); }
  .label { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); margin: 0 0 12px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 500; }
  .row { display: flex; align-items: center; gap: 14px; padding: 6px 0; border-bottom: 1px dashed var(--border-1); }
  .row:last-child { border-bottom: 0; }
  .tok { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-2); width: 110px; }
  .tok b { color: var(--fg-1); font-weight: 500; }
  .bar { height: 14px; background: var(--vb-blue-500); border-radius: 3px; }
  .px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
</style>
</head>
<body>
  <div class="label">Spacing · 4px base · 10 tokens</div>
  <div class="row"><div class="tok"><b>--space-1</b></div><div class="bar" style="width:4px"></div><div class="px">4px</div></div>
  <div class="row"><div class="tok"><b>--space-2</b></div><div class="bar" style="width:8px"></div><div class="px">8px</div></div>
  <div class="row"><div class="tok"><b>--space-3</b></div><div class="bar" style="width:12px"></div><div class="px">12px</div></div>
  <div class="row"><div class="tok"><b>--space-4</b></div><div class="bar" style="width:16px"></div><div class="px">16px</div></div>
  <div class="row"><div class="tok"><b>--space-5</b></div><div class="bar" style="width:20px"></div><div class="px">20px</div></div>
  <div class="row"><div class="tok"><b>--space-6</b></div><div class="bar" style="width:24px"></div><div class="px">24px</div></div>
  <div class="row"><div class="tok"><b>--space-8</b></div><div class="bar" style="width:32px"></div><div class="px">32px</div></div>
  <div class="row"><div class="tok"><b>--space-10</b></div><div class="bar" style="width:40px"></div><div class="px">40px</div></div>
  <div class="row"><div class="tok"><b>--space-12</b></div><div class="bar" style="width:48px"></div><div class="px">48px</div></div>
  <div class="row"><div class="tok"><b>--space-16</b></div><div class="bar" style="width:64px"></div><div class="px">64px</div></div>
</body>
</html>
