<style>
  html, body { background: var(--surface-0); }
  body { display: flex; flex-direction: column; min-height: 100vh; }
  .topnav-spacer { height: var(--topnav-height); }
  .shell { display: grid; grid-template-columns: var(--sidebar-width) minmax(0, 1fr) var(--toc-width); gap: 0; max-width: var(--container-docs); width: 100%; margin: 0 auto; flex: 1; }
  .main { padding: 32px 48px 96px; min-width: 0; }
  @media (max-width: 1100px) { .shell { grid-template-columns: var(--sidebar-width) minmax(0,1fr); } .toc-col { display: none; } }
  *, *::before, *::after { box-sizing: border-box; }
  button { font: inherit; }
</style>
